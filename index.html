<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Sprout – Simple Money Story Learning</title>
<meta name="google" content="notranslate">

<script src="control_center/version-check.js" defer></script>
<script src="control_center/app-version-checker.js" defer></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="flowers.css">

</head>

<body>

<header id="main-header" class="header py-2">
<div class="container-fluid d-flex justify-content-between align-items-center">
<div class="d-flex align-items-center gap-2">
<button class="btn" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
<i class="bi bi-list fs-4"></i>
</button>
<div>
<div class="logo">Sprout</div>
<div class="tagline">Simple stories, lasting thoughts</div>
</div>
</div>
<div class="d-flex gap-2">
<a href="search.html" class="search-btn px-2 d-flex align-items-center"><i class="bi bi-search"></i></a>
<a href="notifications/notifications.html" class="notification"><i class="bi bi-bell"></i></a>
</div>
</div>
</header>

<!-- Sidebar -->
<aside class="offcanvas offcanvas-start" id="sidebar">
<div class="offcanvas-header">
<h5>Sprout</h5>
<button class="btn-close" data-bs-dismiss="offcanvas"></button>
</div>
<nav class="offcanvas-body" id="sidebar-menu"></nav>
</aside>

<main class="container py-3">
<section id="story-container" class="row g-3"></section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ========= Skeleton ========= */
const box = document.getElementById("story-container");

function skeleton(n = 5) {
  box.classList.add("loading");
  let h = "";
  for (let i = 0; i < n; i++) {
    h += `<div class="col-12">
      <article class="story-card p-3">
        <div class="skeleton" style="height:120px"></div>
        <div class="mt-3 skeleton" style="height:10px"></div>
        <div class="mt-2 skeleton" style="height:10px;width:70%"></div>
      </article>
    </div>`;
  }
  box.innerHTML = h;
}

skeleton();

/* ========= Timeout control ========= */
let loadTimeout;
let isLoaded = false;
let retryCount = 0;
const MAX_RETRY = 3;

/* ========= Stories fetch ========= */
function fetchStories() {

  clearTimeout(loadTimeout);
  isLoaded = false;

  // 10s timeout - exact feature requested
  loadTimeout = setTimeout(() => {
    if (!isLoaded) {
      showError();
    }
  }, 10000);

  fetch("shtories.json")
    .then(r => {
      if (!r.ok) throw new Error("Network response was not ok");
      return r.json();
    })
    .then(data => {
      isLoaded = true;
      clearTimeout(loadTimeout);
      retryCount = 0;
      render(data);
      box.classList.remove("loading");
    })
    .catch((error) => {
      console.log("Fetch error:", error);
      if (retryCount < MAX_RETRY) {
        retryCount++;
        console.log(`Retry attempt ${retryCount}/${MAX_RETRY}...`);
        setTimeout(fetchStories, 4000);
      } else {
        clearTimeout(loadTimeout);
        showError();
      }
    });
}

fetchStories();

/* ========= Error UI ========= */
function showError() {
  box.classList.remove("loading");
  isLoaded = true; // Mark as loaded to prevent multiple timeouts

  box.innerHTML = `
  <section class="error-wrapper">
    <article class="error-state" role="alert">
      <figure>
        <img src="Assets/error/error404.png" draggable="false" alt="Error">
      </figure>
      <h2>Something went wrong</h2>
      <p>Please check your internet connection and try again.</p>
      <button class="btn btn-outline-dark btn-sm mt-3" id="retryBtn">Retry</button>
    </article>
  </section>`;

  document.getElementById("retryBtn").onclick = () => {
    retryCount = 0;
    skeleton();
    fetchStories();
  };
}

/* ========= Render ========= */
function render(data) {
  if (!Array.isArray(data) || data.length === 0) {
    showError();
    return;
  }
  
  let h = "";

  data.forEach(s => {
    h += `<div class="col-12">
      <a href="${s.link || '#'}" class="text-decoration-none text-dark">
      <article class="story-card">
        <div class="thumb">
          <div class="img-skeleton skeleton"></div>
          <img src="${s.image}" loading="lazy" alt="${s.title}"
            onload="this.classList.add('loaded'); this.previousElementSibling.classList.add('hide');"
            onerror="this.src='assets/fallback-image.jpg'; this.classList.add('loaded');">
          ${s.isNew ? `<div class='new'>NEW</div>` : ""}
          <div class="ribbon">${s.tag || 'Story'}</div>
        </div>
        <div class="p-3">
          <h6 class="fw-semibold">${s.title || 'Untitled'}</h6>
          <p class="small mb-1">${s.subtitle || ''}</p>
          <small class="text-muted"><i class="bi bi-clock"></i> ${s.duration || '2 min'}</small>
        </div>
      </article>
      </a>
    </div>`;
  });

  box.innerHTML = h;
}

/* ========= Auto reload when internet back ========= */
window.addEventListener("online", () => {
  // Only reload if we're in error state (no content)
  if (box.querySelector('.error-state')) {
    retryCount = 0;
    skeleton();
    fetchStories();
  }
});

/* ========= Sidebar ========= */
const sidebar = document.getElementById("sidebar-menu");
const cache = localStorage.getItem("sidebar");

if (cache) {
  renderSidebar(JSON.parse(cache));
}

fetch("sidebar.json")
  .then(r => r.json())
  .then(data => {
    renderSidebar(data);
    localStorage.setItem("sidebar", JSON.stringify(data));
  })
 /* .catch(() => {
    // Fallback sidebar if offline
    renderSidebar([
      { icon: 'bi-house', title: 'Home', link: '#' },
      { icon: 'bi-book', title: 'Stories', link: '#' },
      { icon: 'bi-wallet2', title: 'Money', link: '#' },
      { divider: true },
      { icon: 'bi-gear', title: 'Settings', link: '#' }
    ]);
  });  */

function renderSidebar(data) {
  let h = "";
  data.forEach(item => {
    if (item.divider) {
      h += `<hr>`;
    } else {
      h += `<a href="${item.link || '#'}">
        <i class="bi ${item.icon || 'bi-circle'}"></i>${item.title || 'Link'}</a>`;
    }
  });
  sidebar.innerHTML = h;
}

/* ========= Header scroll ========= */
let prev = window.pageYOffset;
const header = document.getElementById("main-header");

window.addEventListener("scroll", () => {
  const curr = window.pageYOffset;
  if (curr > 60 && curr > prev) {
    header.classList.add("navbar-hidden");
  } else {
    header.classList.remove("navbar-hidden");
  }
  prev = curr;
});
</script>
</body>
</html>
