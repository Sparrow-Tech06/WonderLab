<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Sprout – Simple Money Story Learning</title>
<meta name="google" content="notranslate">

<script src="control_center/version-check.js" defer></script>
<script src="control_center/app-version-checker.js" defer></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --text:#000000;
  --card:#ffffff;
  --primary:#4f46e5;
  --radius:16px;
  --border:1px solid rgba(0,0,0,0.08);
  --shadow:0 8px 20px rgba(0,0,0,0.06);
  --skeleton:#e5e7eb;
}
@media(prefers-color-scheme:dark){
:root{
  --bg:#212529;
  --text:#ffffff;
  --card:#343a40;
  --border:1px solid rgba(255,255,255,0.08);
  --skeleton:#3a3f44;
}}
*{user-select:none;box-sizing:border-box;}
body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--text);}

/* Skeleton */
.skeleton{
  background:linear-gradient(90deg,var(--skeleton)25%,#f3f4f6 37%,var(--skeleton)63%);
  background-size:400% 100%;
  animation:skeleton 1.3s infinite;
}
@keyframes skeleton{0%{background-position:100%}100%{background-position:0}}

/* Header */
.header{background:var(--card);border-bottom:var(--border);position:sticky;top:0;z-index:1000;transition:.3s;}
.navbar-hidden{transform:translateY(-100%);}
.logo{font-weight:700;font-size:1rem;}
.tagline{font-size:.72rem;color:#64748b;}
.notification{background:#ecfdf5;padding:7px 10px;border-radius:50%;}

/* Sidebar */
.offcanvas{width:85%!important;}
.offcanvas a{color:var(--text);text-decoration:none;padding:10px;display:flex;gap:10px;align-items:center;}
.offcanvas a:hover{background:rgba(0,0,0,0.05);}

/* Card */
.story-card{border-radius:var(--radius);border:var(--border);background:var(--card);overflow:hidden;transition:.25s;}
.story-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
.thumb{position:relative}
.thumb img{width:100%;aspect-ratio:16/8;object-fit:cover;opacity:0;transition:.4s;}
.thumb img.loaded{opacity:1;}
.img-skeleton{position:absolute;inset:0;}
.img-skeleton.hide{opacity:0;transition:.4s;}
.ribbon{position:absolute;right:10px;top:10px;background:var(--primary);color:#fff;padding:4px 8px;border-radius:30px;font-size:.7rem;}
.new{position:absolute;left:10px;top:10px;background:#ef4444;color:#fff;padding:4px 8px;border-radius:6px;font-size:.7rem;}

/* Error state */
.error-wrapper{grid-column:1/-1;min-height:60vh;display:flex;align-items:center;justify-content:center;}
.error-state{text-align:center;max-width:300px;}
.error-state figure{margin:0 0 1rem;}
.error-state img{max-width:120px;opacity:.8;}

#story-container:not(.loading)>.col-12:nth-child(5n+1) .story-card{background:#ffe4e6;}
#story-container:not(.loading)>.col-12:nth-child(5n+2) .story-card{background:#ecfeff;}
#story-container:not(.loading)>.col-12:nth-child(5n+3) .story-card{background:#f0fdf4;}
#story-container:not(.loading)>.col-12:nth-child(5n+4) .story-card{background:#fef9c3;}
#story-container:not(.loading)>.col-12:nth-child(5n+5) .story-card{background:#ede9fe;}

.search-btn{border:var(--border);border-radius:12px;background:var(--card);}
</style>
</head>

<body>

<header id="main-header" class="header py-2">
<div class="container-fluid d-flex justify-content-between align-items-center">
<div class="d-flex align-items-center gap-2">
<button class="btn" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
<i class="bi bi-list fs-4"></i>
</button>
<div>
<div class="logo">Sprout</div>
<div class="tagline">Simple stories, lasting thoughts</div>
</div>
</div>
<div class="d-flex gap-2">
<a href="search.html" class="search-btn px-2 d-flex align-items-center"><i class="bi bi-search"></i></a>
<a href="notifications/notifications.html" class="notification"><i class="bi bi-bell"></i></a>
</div>
</div>
</header>

<!-- Sidebar -->
<aside class="offcanvas offcanvas-start" id="sidebar">
<div class="offcanvas-header">
<h5>Sprout</h5>
<button class="btn-close" data-bs-dismiss="offcanvas"></button>
</div>
<nav class="offcanvas-body" id="sidebar-menu"></nav>
</aside>

<main class="container py-3">
<section id="story-container" class="row g-3"></section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ========= Skeleton ========= */
const box = document.getElementById("story-container");

function skeleton(n = 5) {
  box.classList.add("loading");
  let h = "";
  for (let i = 0; i < n; i++) {
    h += `<div class="col-12">
      <article class="story-card p-3">
        <div class="skeleton" style="height:120px"></div>
        <div class="mt-3 skeleton" style="height:10px"></div>
        <div class="mt-2 skeleton" style="height:10px;width:70%"></div>
      </article>
    </div>`;
  }
  box.innerHTML = h;
}

skeleton();

/* ========= Timeout control ========= */
let loadTimeout;
let isLoaded = false;
let retryCount = 0;
const MAX_RETRY = 3;

/* ========= Stories fetch ========= */
function fetchStories() {

  clearTimeout(loadTimeout);
  isLoaded = false;

  // 20s timeout - exact feature requested
  loadTimeout = setTimeout(() => {
    if (!isLoaded) {
      showError();
    }
  }, 20000);

  fetch("shtories.json")
    .then(r => {
      if (!r.ok) throw new Error("Network response was not ok");
      return r.json();
    })
    .then(data => {
      isLoaded = true;
      clearTimeout(loadTimeout);
      retryCount = 0;
      render(data);
      box.classList.remove("loading");
    })
    .catch((error) => {
      console.log("Fetch error:", error);
      if (retryCount < MAX_RETRY) {
        retryCount++;
        console.log(`Retry attempt ${retryCount}/${MAX_RETRY}...`);
        setTimeout(fetchStories, 4000);
      } else {
        clearTimeout(loadTimeout);
        showError();
      }
    });
}

fetchStories();

/* ========= Error UI ========= */
function showError() {
  box.classList.remove("loading");
  isLoaded = true; // Mark as loaded to prevent multiple timeouts

  box.innerHTML = `
  <section class="error-wrapper">
    <article class="error-state" role="alert">
      <figure>
        <img src="assets/error/not-found.png" draggable="false" alt="Error">
      </figure>
      <h2>Something went wrong</h2>
      <p>Please check your internet connection and try again.</p>
      <button class="btn btn-outline-dark btn-sm mt-3" id="retryBtn">Retry</button>
    </article>
  </section>`;

  document.getElementById("retryBtn").onclick = () => {
    retryCount = 0;
    skeleton();
    fetchStories();
  };
}

/* ========= Render ========= */
function render(data) {
  if (!Array.isArray(data) || data.length === 0) {
    showError();
    return;
  }
  
  let h = "";

  data.forEach(s => {
    h += `<div class="col-12">
      <a href="${s.link || '#'}" class="text-decoration-none text-dark">
      <article class="story-card">
        <div class="thumb">
          <div class="img-skeleton skeleton"></div>
          <img src="${s.image}" loading="lazy" alt="${s.title}"
            onload="this.classList.add('loaded'); this.previousElementSibling.classList.add('hide');"
            onerror="this.src='assets/fallback-image.jpg'; this.classList.add('loaded');">
          ${s.isNew ? `<div class='new'>NEW</div>` : ""}
          <div class="ribbon">${s.tag || 'Story'}</div>
        </div>
        <div class="p-3">
          <h6 class="fw-semibold">${s.title || 'Untitled'}</h6>
          <p class="small mb-1">${s.subtitle || ''}</p>
          <small class="text-muted"><i class="bi bi-clock"></i> ${s.duration || '2 min'}</small>
        </div>
      </article>
      </a>
    </div>`;
  });

  box.innerHTML = h;
}

/* ========= Auto reload when internet back ========= */
window.addEventListener("online", () => {
  // Only reload if we're in error state (no content)
  if (box.querySelector('.error-state')) {
    retryCount = 0;
    skeleton();
    fetchStories();
  }
});

/* ========= Sidebar ========= */
const sidebar = document.getElementById("sidebar-menu");
const cache = localStorage.getItem("sidebar");

if (cache) {
  renderSidebar(JSON.parse(cache));
}

fetch("sidebar.json")
  .then(r => r.json())
  .then(data => {
    renderSidebar(data);
    localStorage.setItem("sidebar", JSON.stringify(data));
  })
 /* .catch(() => {
    // Fallback sidebar if offline
    renderSidebar([
      { icon: 'bi-house', title: 'Home', link: '#' },
      { icon: 'bi-book', title: 'Stories', link: '#' },
      { icon: 'bi-wallet2', title: 'Money', link: '#' },
      { divider: true },
      { icon: 'bi-gear', title: 'Settings', link: '#' }
    ]);
  });  */

function renderSidebar(data) {
  let h = "";
  data.forEach(item => {
    if (item.divider) {
      h += `<hr>`;
    } else {
      h += `<a href="${item.link || '#'}">
        <i class="bi ${item.icon || 'bi-circle'}"></i>${item.title || 'Link'}</a>`;
    }
  });
  sidebar.innerHTML = h;
}

/* ========= Header scroll ========= */
let prev = window.pageYOffset;
const header = document.getElementById("main-header");

window.addEventListener("scroll", () => {
  const curr = window.pageYOffset;
  if (curr > 60 && curr > prev) {
    header.classList.add("navbar-hidden");
  } else {
    header.classList.remove("navbar-hidden");
  }
  prev = curr;
});
</script>
</body>
</html>
